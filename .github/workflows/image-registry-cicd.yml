# 이 workflow는 "서버 배포"까지는 하지 않고
# GitHub Actions에서 MSA 저장소 안의 서비스 이미지를 만들어 GHCR까지 올리는 역할만 담당한다.
# 현재 이 저장소 기준 대상은 config, discovery, apigateway 세 모듈이다.
name: image-registry-cicd

on:
  # GitHub Actions 화면에서 버튼으로 직접 실행할 수 있게 한다.
  workflow_dispatch:
  push:
    # main 또는 master에 코드가 들어올 때 자동으로 동작한다.
    branches:
      - main
      - master
    # 아래 경로가 바뀐 경우에만 실행해서 불필요한 빌드를 줄인다.
    paths:
      - "config/**"
      - "discovery/**"
      - "apigateway/**"
      - ".github/workflows/image-registry-cicd.yml"

concurrency:
  # 같은 workflow가 연속으로 실행되면 이전 작업을 취소하고
  # 가장 최신 코드 기준 실행만 남기도록 한다.
  group: image-registry-cicd
  cancel-in-progress: true

permissions:
  # 저장소 코드를 checkout 하려면 읽기 권한이 필요하다.
  contents: read
  # GHCR에 이미지를 push 하려면 packages 쓰기 권한이 필요하다.
  packages: write

jobs:
  build-and-push:
    # matrix로 서비스별 작업이 나뉘므로
    # Actions 화면에서 어떤 서비스가 실행 중인지 바로 보이게 이름을 붙인다.
    name: "${{ matrix.module_name }} 이미지 빌드 및 푸시"
    # GitHub가 제공하는 리눅스 실행기를 사용한다.
    runs-on: ubuntu-latest
    strategy:
      # 한 서비스가 실패해도 다른 서비스 빌드는 계속 진행하게 한다.
      fail-fast: false
      matrix:
        # include를 쓰면 서비스별 폴더 경로와 이미지 이름을 한 번에 관리할 수 있다.
        include:
          - module_name: config
            module_dir: config
            image_name: config
          - module_name: discovery
            module_dir: discovery
            image_name: discovery
          - module_name: apigateway
            module_dir: apigateway
            image_name: apigateway

    steps:
      # 현재 저장소 코드를 runner로 내려받는다.
      # 이 단계가 있어야 Gradle 빌드와 Docker 빌드에 필요한 파일을 사용할 수 있다.
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 각 모듈이 Spring Boot 프로젝트라서 JDK 17을 먼저 준비한다.
      # cache: gradle 옵션은 의존성을 다시 받는 시간을 줄여서 빌드 속도를 안정적으로 만든다.
      - name: JDK 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # GHCR 경로는 소문자 저장소명이 가장 안전하므로 owner 값을 한 번 정리한다.
      # IMAGE_TAG는 현재 커밋 SHA 앞 7자리로 두어서
      # "어떤 코드에서 만들어진 이미지인지" 나중에 추적하기 쉽게 만든다.
      - name: 이미지 경로 값 준비
        shell: bash
        run: |
          echo "IMAGE_REGISTRY=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "${GITHUB_ENV}"
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "${GITHUB_ENV}"

      # GitHub Actions의 기본 토큰으로 GHCR 로그인까지 처리한다.
      # 별도 레지스트리 계정 비밀번호를 저장소 시크릿에 넣지 않아도 되는 장점이 있다.
      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 먼저 실행용 jar를 만들고
      # 그 다음 현재 모듈의 Dockerfile 기준으로 이미지를 만든다.
      # PUSH_IMAGE=true 이므로 build_docker.sh 내부에서 docker push까지 같이 수행된다.
      # LOAD_TO_MINIKUBE는 로컬 minikube용 옵션이라
      # GitHub Actions에서는 false로 꺼 두는 것이 맞다.
      - name: Prepare image URI # 레지스트리 경로와 태그 조합
        id: prepare-image
        run: |
          IMAGE_PATH="${REGISTRY}/$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE_PATH}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE_PATH}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image # Dockerfile 기반 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prepare-image.outputs.image }}
            ${{ steps.prepare-image.outputs.latest }}
          platforms: linux/amd64,linux/arm64
#      - name: 이미지 빌드 및 푸시
#        shell: bash
#        # matrix에 들어 있는 module_dir로 이동하면
#        # 각 서비스 폴더 안의 scripts/build_jar.sh, scripts/build_docker.sh를 그대로 재사용할 수 있다.
#        working-directory: ${{ matrix.module_dir }}
#        env:
#          # 최종 이미지 경로 예:
#          # ghcr.io/parkjinwoo/config:a1b2c3d
#          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
#          IMAGE_NAME: ${{ matrix.image_name }}
#          IMAGE_TAG: ${{ env.IMAGE_TAG }}
#          # true로 두면 build_docker.sh 내부에서 docker push를 실행한다.
#          PUSH_IMAGE: "true"
#          # GitHub Actions는 minikube에 적재할 필요가 없으므로 false로 둔다.
#          LOAD_TO_MINIKUBE: "false"
#        run: |
#          # 실행 가능한 jar를 먼저 만든다.
#          ./scripts/build_jar.sh
#          # 방금 만든 jar를 포함한 Docker 이미지를 만들고 GHCR로 올린다.
#          ./scripts/build_docker.sh

      # Actions 화면에서 어떤 이미지가 올라갔는지 바로 보이게 마지막에 출력한다.
      # 실제 배포는 하지 않지만, 이 출력만으로도 다음 단계에서 어떤 태그를 써야 할지 확인할 수 있다.
      - name: 결과 출력
        shell: bash
        run: |
          echo "완료 이미지: ${{ env.IMAGE_REGISTRY }}/${{ matrix.image_name }}:${{ env.IMAGE_TAG }}"
