apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: msa
  labels:
    app: config-service
spec:
  type: ClusterIP
  selector:
    app: config-service
  ports:
    - name: http
      port: 8888
      targetPort: 8888
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: msa
  labels:
    app: config-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      volumes:
        - name: config-repo
          configMap:
            name: config-repo
            optional: false
      containers:
        - name: config-service
          image: config:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: native
            - name: SPRING_APPLICATION_NAME
              value: config-service
            - name: SERVER_PORT
              value: "8888"
            - name: SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS
              value: file:/config
          volumeMounts:
            - name: config-repo
              mountPath: /config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 40
            periodSeconds: 30
